name: daily_account
description: "Daily Account — A spiritual accountability app for your daily walk with God (CMFI discipline)."
publish_to: 'none'
version: 2.0.0+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Local persistent database
  sqflite: ^2.3.2
  path: ^1.9.0
  # Daily reminder notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  # Send email / open WhatsApp
  url_launcher: ^6.2.6
  # Lightweight key-value (settings)
  shared_preferences: ^2.2.3
  # Google fonts for beautiful typography
  google_fonts: ^6.2.1
  # Subtle animations
  flutter_animate: ^4.5.0
  # Intl for date formatting
  intl: ^0.20.2
  # Internationalization (French/English)
  flutter_localizations:
    sdk: flutter
  # File system paths
  path_provider: ^2.1.4
  # File picker for backup/restore
  file_picker: ^8.1.6
  # Share files
  share_plus: ^12.0.2
  # Biometric / PIN lock
  local_auth: ^2.3.0
  # PDF generation & printing/sharing
  pdf: ^3.11.1
  printing: ^5.13.3
  # Dynamic app version info
  package_info_plus: ^8.1.1
  flutter_timezone: ^5.1.0
  fl_chart: ^1.2.0
  home_widget: ^0.9.3
  # Voice notes — recording & playback
  record: ^5.1.2
  audioplayers: ^6.1.0
  flutter_background_service: ^5.1.0
  flutter_overlay_window: ^0.5.0
  # Cloud sync — Google Drive backup/restore
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.2.2

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.5.3
  sqflite_common_ffi: ^2.3.3
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0D0A05"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/verses.json
    - assets/app_icon.png
    - assets/cmfilogo.png
